# Data Processor Agent
# 讀取 CSV/JSON 資料並用 LLM 分析，產出摘要報告

name: data-processor
description: "資料分析流水線：讀取資料 → LLM 分析 → 儲存結果"
model: openai/gpt-4o-mini
max_retries: 2

steps:
  - name: read_data
    action: shell
    command: "type data.csv 2>nul || type data.json 2>nul || echo No data file found. Please create data.csv or data.json."

  - name: analyze
    action: llm
    prompt: |
      你是資料分析師，請分析以下資料並提供：
      1. 資料概覽（總筆數、欄位、資料類型）
      2. 關鍵統計（最大值、最小值、平均值等）
      3. 異常值或值得注意的模式
      4. 行動建議（3 條）

      資料內容：
      {{ steps.read_data.output }}

  - name: save_result
    action: save
    path: "data-analysis-result.md"
    content: |
      # Data Analysis Report

      Generated by AgentForge data-processor agent.

      {{ steps.analyze.output }}
